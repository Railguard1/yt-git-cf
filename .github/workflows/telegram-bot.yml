name: Telegram YouTube Downloader

on:
  repository_dispatch:
    types: [yt_list_formats, yt_download]
  workflow_dispatch:
    inputs:
      mode:
        description: "list or download"
        required: true
        default: "download"
      url:
        description: "YouTube URL"
        required: true
      chat_id:
        description: "Telegram chat id"
        required: true
      format:
        description: "height (e.g. 720) or audio"
        required: false
        default: "720"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yt-dlp and PO token plugin
        run: pip install -U -r requirements.txt bgutil-ytdlp-pot-provider

      - name: Start PO token server
        run: |
          git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /tmp/bgutil
          cd /tmp/bgutil/server
          npm install
          npx tsc
          nohup node build/main.js > /tmp/bgutil.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:4416/ping > /dev/null; then
              echo "PO token server is up"
              break
            fi
            sleep 1
          done
          cat /tmp/bgutil.log || true

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event.action == 'yt_list_formats' && 'list' || (github.event.inputs.mode || 'download') }}
          VIDEO_URL: ${{ github.event.client_payload.url || github.event.inputs.url }}
          CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id }}
          FORMAT: ${{ github.event.client_payload.format || github.event.inputs.format || '720' }}
        run: python bot.py
