name: Telegram YouTube Downloader

on:
  repository_dispatch:
    types: [yt_list_formats, yt_playlist_range, yt_download]
  workflow_dispatch:
    inputs:
      mode:
        description: "list or download"
        required: true
        default: "download"
      url:
        description: "YouTube URL"
        required: true
      chat_id:
        description: "Telegram chat id"
        required: true
      format:
        description: "height (e.g. 720) or audio"
        required: false
        default: "720"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    services:
      bgutil-pot:
        image: brainicism/bgutil-ytdlp-pot-provider
        ports:
          - 4416:4416
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp and PO token plugin
        run: pip install -U -r requirements.txt bgutil-ytdlp-pot-provider

      - name: Ensure ffmpeg is available
        run: |
          if ! command -v ffmpeg >/dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n1

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ (github.event.action == 'yt_list_formats' && 'list') || (github.event.action == 'yt_playlist_range' && 'playlist_range') || (github.event.inputs.mode || 'download') }}
          VIDEO_URL: ${{ github.event.client_payload.url || github.event.inputs.url }}
          CHAT_ID: ${{ github.event.client_payload.chat_id || github.event.inputs.chat_id }}
          FORMAT: ${{ github.event.client_payload.format || github.event.inputs.format || '720' }}
          STATUS_MESSAGE_ID: ${{ github.event.client_payload.status_message_id }}
          LIST_ID: ${{ github.event.client_payload.list_id }}
          RANGE_START: ${{ github.event.client_payload.range_start }}
          RANGE_END: ${{ github.event.client_payload.range_end }}
        run: python bot.py
